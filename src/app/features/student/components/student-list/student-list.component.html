<div class="student-list-container">
  <div class="header">
    <h1>Students</h1>
    <button mat-raised-button color="primary" routerLink="/students/new">
      <mat-icon>person_add</mat-icon> New Student
    </button>
  </div>

  <div *ngIf="loading" class="loading-spinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div class="table-wrapper" *ngIf="!loading">
    <table mat-table [dataSource]="students" class="mat-elevation-z2">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> # </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element" class="name-cell"> {{element.fullName}} </td>
      </ng-container>

      <ng-container matColumnDef="registrationNumber">
        <th mat-header-cell *matHeaderCellDef> Registration </th>
        <td mat-cell *matCellDef="let element"> {{element.registrationNumber}} </td>
      </ng-container>

      <ng-container matColumnDef="course">
        <th mat-header-cell *matHeaderCellDef> Course </th>
        <td mat-cell *matCellDef="let element"> {{element.course}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-header"> Actions </th>
        <td mat-cell *matCellDef="let element" class="actions-cell">
          <button mat-icon-button (click)="viewStudent(element)" matTooltip="View">
            <mat-icon class="action-view">visibility</mat-icon>
          </button>
          <button mat-icon-button (click)="editStudent(element)" matTooltip="Edit">
            <mat-icon class="action-edit">edit</mat-icon>
          </button>
          <button mat-icon-button (click)="deleteStudent(element)" matTooltip="Delete">
            <mat-icon class="action-delete">delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">
          No students found. Click "New Student" to add one.
        </td>
      </tr>
    </table>
  </div>
</div>
